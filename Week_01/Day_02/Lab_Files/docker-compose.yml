# Docker Compose configuration for Day 2 Kafka lab
#
# This Compose file starts a single-node Apache Kafka cluster
# running in KRaft (no ZooKeeper) mode.  The broker listens on
# port 9092 for client connections.  A schema registry is not
# included to keep the example simple; you can add one (e.g.,
# `confluentinc/cp-schema-registry`) for Avro serialization
# experiments.

services:
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: day2_kafka
    environment:
      KAFKA_PROCESS_ROLES: 'broker,controller'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      # Unique ID for the broker in the quorum
      KAFKA_NODE_ID: 1
      # The controller quorum voters specify the node IDs and addresses.
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      # Define separate listeners for Docker-internal clients and host clients.
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      # Other common settings
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    ports:
      - '9092:9092'
      - '9093:9093'
    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: day2_kafka_ui
    depends_on:
      - kafka
    ports:
      - '8080:8080'
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
      KAFKA_CLUSTERS_0_NAME: 'day2-local'
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: 'kafka:29092'

volumes:
  kafka-data:
