services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: day6-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - day6-hop

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: day6-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - day6-hop

  postgres:
    image: postgres:15-alpine
    container_name: day6-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: medallion_db
      POSTGRES_USER: hop_user
      POSTGRES_PASSWORD: hop_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./setup_postgresql.sql:/docker-entrypoint-initdb.d/01_day6_lab.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hop_user -d medallion_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - day6-hop

  hop-web:
    image: apache/hop-web:latest
    container_name: day6-hop-web
    ports:
      - "8082:8080"
    environment:
      HOP_LOG_LEVEL: Basic
      HOP_PROJECT_NAME: day6_hop_lab
      HOP_PROJECT_FOLDER: /project
    volumes:
      - ./:/project:rw
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - day6-hop

  hop-cli:
    image: apache/hop:latest
    container_name: day6-hop-cli
    profiles:
      - cli
    working_dir: /project
    environment:
      HOP_LOG_LEVEL: Basic
      HOP_PROJECT_NAME: day6_hop_lab
      HOP_PROJECT_FOLDER: /project
    volumes:
      - ./:/project:rw
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - day6-hop
    command: ["tail", "-f", "/dev/null"]

volumes:
  postgres_data:

networks:
  day6-hop:
    driver: bridge
