global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Kafka broker JMX metrics via embedded jmx_prometheus_javaagent
  - job_name: 'kafka-brokers'
    static_configs:
      - targets:
          - 'kafka1:7071'
          - 'kafka2:7071'
          - 'kafka3:7071'
        labels:
          cluster: 'taxi-kraft'

  # Consumer lag metrics
  - job_name: 'kafka-lag-exporter'
    static_configs:
      - targets: ['kafka-lag-exporter:9999']

  # Application-level metrics from our Python services
  - job_name: 'taxi-producer'
    static_configs:
      - targets: ['host.docker.internal:8001']
        labels:
          service: 'taxi_simulator'

  - job_name: 'taxi-consumer'
    static_configs:
      - targets: ['host.docker.internal:8002']
        labels:
          service: 'trip_consumer'

  - job_name: 'surge-detector'
    static_configs:
      - targets: ['host.docker.internal:8003']
        labels:
          service: 'surge_detector'

  - job_name: 'quality-validator'
    static_configs:
      - targets: ['host.docker.internal:8004']
        labels:
          service: 'quality_validator'
