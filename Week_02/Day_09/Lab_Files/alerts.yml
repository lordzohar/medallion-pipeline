groups:
  - name: kafka_alerts
    interval: 15s
    rules:
      - alert: HighConsumerLag
        expr: kafka_consumergroup_group_lag > 1000
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "Consumer group {{ $labels.group }} is lagging"
          description: "Lag is {{ $value }} on topic {{ $labels.topic }}"

      - alert: BrokerDown
        expr: up{job="kafka-brokers"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Kafka broker {{ $labels.instance }} is down"

      - alert: UnderReplicatedPartitions
        expr: kafka_server_replicamanager_underreplicatedpartitions > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Under-replicated partitions detected"

      - alert: HighErrorRate
        expr: rate(taxi_trips_invalid_total[1m]) > 5
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "High data quality failure rate"
          description: "{{ $value }} invalid trips/sec"

      - alert: SurgeActive
        expr: surge_multiplier > 1.5
        for: 30s
        labels:
          severity: info
        annotations:
          summary: "Surge pricing active in zone {{ $labels.zone }}"
          description: "Multiplier: {{ $value }}x"
