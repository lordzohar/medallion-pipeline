global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: kafka-jmx
    static_configs:
      - targets: ["kafka:9404"]

  - job_name: kafka-connect
    metrics_path: /
    static_configs:
      - targets: ["connect:8083"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ["minio:9000"]

  - job_name: quality-dashboard
    metrics_path: /metrics
    static_configs:
      - targets: ["quality-dashboard:5001"]

  - job_name: business-dashboard
    metrics_path: /metrics
    static_configs:
      - targets: ["business-dashboard:5002"]

  - job_name: live-map-dashboard
    metrics_path: /metrics
    static_configs:
      - targets: ["live-map-dashboard:5003"]
