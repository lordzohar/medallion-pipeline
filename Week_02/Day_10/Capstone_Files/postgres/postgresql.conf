# Postgres config tuned for Debezium logical replication (pgoutput).
listen_addresses = '*'

# --- WAL / replication ---
wal_level = logical
max_wal_senders = 10
max_replication_slots = 10
wal_keep_size = 256MB

# --- performance (dev sized) ---
shared_buffers = 256MB
work_mem = 16MB
maintenance_work_mem = 64MB
effective_cache_size = 512MB

# --- logging ---
log_min_messages = warning
log_min_error_statement = error
log_connections = on
log_disconnections = on

# --- statistics ---
track_commit_timestamp = on
